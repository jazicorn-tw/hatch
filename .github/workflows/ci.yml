name: CI

on:
  pull_request:
  push:
    branches: [ main, staging ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Quality (go vet + staticcheck) ────────────────────────────────────────────
  quality:
    name: go vet + staticcheck
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_GO_ANALYSIS != 'FALSE' }}

    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest

  # ── Test (build + test) ────────────────────────────────────────────────────────
  test:
    name: Build + test
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_GO_ANALYSIS != 'FALSE' && (needs.quality.result == 'success' || needs.quality.result == 'skipped') }}

    needs:
      - quality

    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Compile
        run: go build ./...

      - name: Run tests
        run: go test ./...

      - name: Upload test reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/test

  # ── Markdown lint ─────────────────────────────────────────────────────────────
  markdown-lint:
    name: Markdown lint (markdownlint-cli2)
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_MD_LINT != 'FALSE' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint markdown files
        run: yarn markdownlint-cli2 '**/*.md' '#node_modules'

  # ── Frontmatter tag validation ─────────────────────────────────────────────
  docs-tags:
    name: Validate frontmatter tags
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_DOCS_TAGS != 'FALSE' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docs frontmatter tags
        run: bash scripts/ci/validate-frontmatter-tags.sh
