apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hatch.fullname" . }}
  labels:
    {{- include "hatch.labels" . | nindent 4 }}
type: Opaque
stringData:
  webPassword: {{ .Values.config.webPassword | quote }}
  jwtSecret: {{ .Values.config.jwtSecret | quote }}
  {{- if .Values.secrets.anthropicApiKey }}
  anthropicApiKey: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.openaiApiKey }}
  openaiApiKey: {{ .Values.secrets.openaiApiKey | quote }}
  {{- end }}
