# Unified taxonomy for docs frontmatter tags and conventional commit scopes.
#
# both:     valid as docs frontmatter tag AND as a conventional commit scope
#             feat(ci): ...   fix(tooling): ...   tags: [ci, tooling, ...]
#
# scopes:   valid as a conventional commit scope ONLY — not a docs frontmatter tag
#             chore(deps): ...
#
# docs:     valid as docs frontmatter tag ONLY — not a valid commit scope
#             tags: [architecture, foundation, go]
#
# Enforced by:
#   - pre-add hook      → docs/ frontmatter tags (both + docs)
#   - commit-msg hook   → conventional commit scopes (both + scopes)

tags:
  both:
    - act
    - actions
    - adr
    - agent
    - api
    - build
    - chunker
    - ci
    - cli
    - commit
    - config
    - db
    - deploy
    - dev
    - devops
    - docker
    - dx
    - e2e
    - embedder
    - env
    - errors
    - faq
    - hooks
    - ingest
    - llm
    - local
    - ollama
    - onboarding
    - pipeline
    - planning
    - providers
    - qa
    - quiz
    - release
    - runtime
    - security
    - source
    - store
    - test
    - tooling
    - ux
  scopes:
    - deps
  docs:
    - architecture
    - bubble-tea
    - concurrency
    - configuration
    - fakes
    - foundation
    - go
    - milestone
    - phases
    - reports
    - sqlite
    - template
    - tui
