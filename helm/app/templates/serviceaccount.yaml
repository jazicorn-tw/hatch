{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "hatch.serviceAccountName" . }}
  labels:
    {{- include "hatch.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# hatch does not call the Kubernetes API — disable token auto-mount to reduce attack surface.
automountServiceAccountToken: {{ .Values.serviceAccount.automountToken }}
{{- end }}
