name: CI

on:
  pull_request:
  push:
    branches: [ main, staging ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Quality (go vet + staticcheck) ────────────────────────────────────────────
  quality:
    name: go vet + staticcheck
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_GO_ANALYSIS != 'FALSE' }}
    permissions:
      contents: read

    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@9716614d4101e79b4340dd97b10e54d68234e431 # v1
        with:
          version: latest

  # ── Test (build + test) ────────────────────────────────────────────────────────
  test:
    name: Build + test
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_GO_ANALYSIS != 'FALSE' && (needs.quality.result == 'success' || needs.quality.result == 'skipped') }}
    permissions:
      contents: read

    needs:
      - quality

    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Compile
        run: go build ./...

      - name: Run tests
        run: go test ./...

      - name: Upload test reports (on failure)
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-reports
          path: build/reports/tests/test

  # ── Markdown lint ─────────────────────────────────────────────────────────────
  markdown-lint:
    name: Markdown lint (markdownlint-cli2)
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_MD_LINT != 'FALSE' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint markdown files
        run: yarn markdownlint-cli2 '**/*.md' '#node_modules'

  # ── Frontmatter tag validation ─────────────────────────────────────────────
  docs-tags:
    name: Validate frontmatter tags
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_DOCS_TAGS != 'FALSE' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate docs frontmatter tags
        run: bash scripts/ci/validate-frontmatter-tags.sh
