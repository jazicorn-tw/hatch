name: Publish

# Publishes Docker image and Helm chart to GHCR on every vX.Y.Z tag push.
# Kept separate from release.yml to avoid needs-chain skip issues — when
# triggered by a tag push, release.yml's release job is skipped, which
# caused the publish job inside release.yml to be skipped as well.
#
# Job order:  gate → validate-helm → docker → helm-push
#
# If validate-helm fails (lint error, package error), docker is skipped and
# nothing is published. If docker fails, helm-push is skipped. This ensures
# both artifacts are published together or not at all.

on:
  push:
    tags: [ 'v*.*.*' ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Gate ─────────────────────────────────────────────────────────────────────
  # Fails fast if either publish flag is disabled, skipping all downstream jobs.
  gate:
    name: Check publish conditions
    runs-on: ubuntu-latest

    if: github.repository == vars.CANONICAL_REPOSITORY

    steps:
      - name: Validate publish flags
        run: |
          set -euo pipefail
          ok=true
          if [[ "${{ vars.PUBLISH_DOCKER_IMAGE }}" != "TRUE" ]]; then
            echo "::warning::PUBLISH_DOCKER_IMAGE is not TRUE"
            ok=false
          fi
          if [[ "${{ vars.PUBLISH_HELM_CHART }}" != "TRUE" ]]; then
            echo "::warning::PUBLISH_HELM_CHART is not TRUE"
            ok=false
          fi
          if [[ "$ok" == "false" ]]; then
            echo "One or more publish flags are disabled — skipping both Docker and Helm"
            exit 1
          fi

  # ── Validate Helm ────────────────────────────────────────────────────────────
  # Lints and dry-run packages the Helm chart before Docker is built.
  # If this fails, Docker is never run and nothing is published.
  validate-helm:
    name: Validate Helm chart
    runs-on: ubuntu-latest
    needs: gate

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.14.4

      - name: Lint Helm chart
        run: helm lint helm/app

      - name: Dry-run package Helm chart
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          helm package helm/app \
            --version "$VERSION" \
            --app-version "$VERSION"

  # ── Docker ──────────────────────────────────────────────────────────────────
  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: [gate, validate-helm]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Stable  v1.2.3          → 1.2.3, 1.2, 1, latest
      # Canary  v1.2.3-canary.1 → 1.2.3-canary.1, canary
      - name: Extract Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref, '-') }}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref, '-') }}
            type=raw,value=canary,enable=${{ contains(github.ref, '-canary') }}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Helm push ────────────────────────────────────────────────────────────────
  helm:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    needs: [gate, validate-helm, docker]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.14.4

      - name: Log in to GHCR
        run: |
          set -euo pipefail
          echo "${{ github.token }}" | helm registry login ghcr.io \
            --username "${{ github.repository_owner }}" \
            --password-stdin

      - name: Publish Helm chart
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "ref_name : ${{ github.ref_name }}"
          echo "VERSION  : $VERSION"
          CHART_NAME="$(helm show chart helm/app | grep '^name:' | awk '{print $2}')"
          echo "CHART_NAME: $CHART_NAME"
          helm package helm/app \
            --version "$VERSION" \
            --app-version "$VERSION"
          echo "Package created: ${CHART_NAME}-${VERSION}.tgz"
          helm push "${CHART_NAME}-${VERSION}.tgz" \
            oci://ghcr.io/${{ github.repository_owner }}/charts
          echo "Push complete"
